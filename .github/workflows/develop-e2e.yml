name: Develop E2E

on:
  push:
    branches:
      - develop

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build docker containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d || true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Playwright if installed
        run: |
          cd frontend-web-service
          if [ -f "playwright.config.ts" ]; then
            npm ci
            npx playwright install
            npx playwright test
          else
            echo "Playwright not installed yet. Skipping E2E."
          fi