spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  datasource:
    url: jdbc:postgresql://localhost:5432/eventpick
    username: user
    password: password
  data:
    redis:
      host: localhost
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.ap-northeast-1.amazonaws.com/ap-northeast-1_XXXXXXXXX
  flyway:
    enabled: false

# ローカルではAWSクライアント無効化
aws:
  region: ap-northeast-1

logging:
  level:
    com.eventpick: DEBUG
    org.hibernate.SQL: DEBUG
