spring:
  application:
    name: eventpick-backend

  profiles:
    active: local

  # JPA / PostgreSQL
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 50
          batch_versioned_data: true
        format_sql: false

  # Datasource - PostgreSQL (RDS)
  datasource:
    url: jdbc:postgresql://localhost:5432/eventpick
    username: user
    password: password
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
      pool-name: evk-hikari-pool

  # Redis Cache
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5

  # Security - JWT (OAuth2 Resource Server / Cognito)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:https://cognito-idp.ap-northeast-1.amazonaws.com/ap-northeast-1_XXXXXXXXX}

  # Servlet
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Flyway Database Migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Server
server:
  port: 8080
  tomcat:
    threads:
      max: 400
      min-spare: 50
    max-connections: 10000
    accept-count: 200
    connection-timeout: 5000
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 0.1

# AWS
aws:
  region: ${AWS_REGION:ap-northeast-1}
  s3:
    bucket: ${S3_BUCKET:eventpick-uploads}
  ses:
    from-email: ${SES_FROM_EMAIL:noreply@eventpick.co.jp}
  cognito:
    user-pool-id: ${COGNITO_USER_POOL_ID:ap-northeast-1_XXXXXXXXX}
    client-id: ${COGNITO_CLIENT_ID:}

# Resilience4j
resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
        minimum-number-of-calls: 5
      externalApi:
        failure-rate-threshold: 60
        wait-duration-in-open-state: 60s
        sliding-window-size: 20
        minimum-number-of-calls: 10
    instances:
      stripe:
        base-config: externalApi
      googleMaps:
        base-config: externalApi
      cognito:
        base-config: default
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
      externalApi:
        max-attempts: 2
        wait-duration: 1s
    instances:
      stripe:
        base-config: externalApi
      ses:
        base-config: default

# SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
