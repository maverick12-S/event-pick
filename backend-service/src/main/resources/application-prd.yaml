spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 100
      minimum-idle: 20
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI}
  flyway:
    enabled: true

server:
  tomcat:
    threads:
      max: 800
      min-spare: 100
    max-connections: 20000
    accept-count: 500

aws:
  region: ${AWS_REGION:ap-northeast-1}
  s3:
    bucket: ${S3_BUCKET}
  ses:
    from-email: ${SES_FROM_EMAIL}
  cognito:
    user-pool-id: ${COGNITO_USER_POOL_ID}
    client-id: ${COGNITO_CLIENT_ID}

management:
  tracing:
    sampling:
      probability: 0.05

# 本番ではSwagger無効化
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: WARN
    com.eventpick: INFO

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://eventpick.co.jp,https://www.eventpick.co.jp}
