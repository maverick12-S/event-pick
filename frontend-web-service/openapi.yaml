components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PaginationLimit:
      name: limit
      in: query
      schema:
        type: integer
        default: 40
      description: 1ページ件数（デフォルト: 40）
    PaginationPage:
      name: page
      in: query
      schema:
        type: integer
        default: 1
      description: ページ番号（1から開始）

  responses:
    RateLimitHeaders:
      description: Rate limit headers
      headers:
        X-RateLimit-Limit:
          description: リクエスト上限
          schema:
            type: integer
        X-RateLimit-Remaining:
          description: 残りリクエスト数
          schema:
            type: integer
        X-RateLimit-Reset:
          description: リセット時刻（UNIX秒）
          schema:
            type: integer

  schemas:
    CommonResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 成功フラグ
        data:
          description: 成功時はオブジェクト、失敗時は null
          nullable: true
          type: object
        error:
          nullable: true
          $ref: '#/components/schemas/ErrorPayload'
        timestamp:
          type: string
          format: date-time
          description: レスポンス生成時刻（UTC ISO8601）

    ErrorPayload:
      type: object
      properties:
        code:
          type: string
          description: エラーコード（E1xxx〜）
        message:
          type: string
        details:
          type: array
          items:
            type: string

    LoginRequest:
      type: object
      required: [realm, username, password]
      properties:
        realm:
          type: string
        username:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
        refresh_expires_in:
          type: integer
        refresh_token:
          type: string
        token_type:
          type: string
        session_state:
          type: string
        scope:
          type: string

    SignupRequest:
      type: object
      required: [corporateCode, companyName, representative, notifyEmail]
      properties:
        corporateCode:
          type: string
        companyName:
          type: string
        representative:
          type: string
        notifyEmail:
          type: string
          format: email

    Company:
      type: object
      properties:
        company_id:
          type: string
          description: ULID CHAR(26)
        company_code:
          type: string
        company_name:
          type: string
        display_name:
          type: string
        company_type:
          type: string
          enum: ['1', '2']
        representative_name:
          type: string
        admin_email:
          type: string
          format: email
        admin_phone:
          type: string

    CompanyAccount:
      type: object
      properties:
        company_account_id:
          type: string
        company_id:
          type: string
        company_role_id:
          type: string
          enum: ['01', '02', '03']
        branch_code:
          type: string
        branch_name:
          type: string
        branch_display_name:
          type: string
        postal_code:
          type: string
        prefecture_code:
          type: string
        city:
          type: string
        address_line:
          type: string
        phone_number:
          type: string
        contact_email:
          type: string
        status:
          type: string
          enum: ['1', '2']

    CompanyTicket:
      type: object
      properties:
        ticket_id:
          type: string
        company_id:
          type: string
        daily_granted:
          type: integer
        daily_used:
          type: integer
        daily_remaining:
          type: integer
        daily_reset_at:
          type: string
          format: date-time
        monthly_granted:
          type: integer
        monthly_used:
          type: integer
        monthly_remaining:
          type: integer
        monthly_target:
          type: string
          description: YYYYMM

    CompanyReview:
      type: object
      properties:
        review_id:
          type: string
        company_id:
          type: string
        review_type:
          type: string
          enum: ['1', '2', '3']
        review_status:
          type: string
          enum: ['1', '2', '3', '4']
        applied_at:
          type: string
          format: date-time
        reviewed_at:
          type: string
          format: date-time
        reviewer_id:
          type: string
        review_comment:
          type: string
        is_active:
          type: boolean

    EventPost:
      type: object
      properties:
        post_id:
          type: string
        template_id:
          type: string
        company_account_id:
          type: string
        title:
          type: string
          maxLength: 20
        summary:
          type: string
          maxLength: 80
        description:
          type: string
          maxLength: 1000
        reservation_url:
          type: string
          format: uri
        address:
          type: string
        event_date:
          type: string
          format: date
        event_start_time:
          type: string
        event_end_time:
          type: string
        category_id:
          type: string
        status:
          $ref: '#/components/schemas/EventStatus'
        like_count:
          type: integer

    PostCreateRequest:
      type: object
      required: [title, summary, event_date, event_start_time, event_end_time, category_id]
      properties:
        title:
          type: string
          maxLength: 20
        summary:
          type: string
          maxLength: 80
        description:
          type: string
          maxLength: 1000
        reservation_url:
          type: string
          format: uri
        address:
          type: string
        event_date:
          type: string
          format: date
        event_start_time:
          type: string
        event_end_time:
          type: string
        category_id:
          type: string
        post_dates:
          type: array
          items:
            type: string
            format: date
        condition:
          type: object
          properties:
            hashtags:
              type: array
              items:
                type: string
            platforms:
              type: array
              items:
                type: string
            autoPost:
              type: boolean
            repeatInterval:
              type: string
            captionTemplate:
              type: string

    UserAccount:
      type: object
      properties:
        user_id:
          type: string
        auth_sub:
          type: string
        login_type:
          type: string
          enum: [email, phone, google, line]
        user_name:
          type: string
        user_email:
          type: string
          format: email
        phone_number:
          type: string
        user_gender:
          type: string
          enum: [M, F, O]
        birth_year:
          type: string
        terms_agreed:
          type: boolean
        is_active:
          type: boolean

    BillingAddress:
      type: object
      required: [name, email, country, postalCode, prefecture, city, address1, phoneCountry, phoneNumber]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        country:
          type: string
        postalCode:
          type: string
        prefecture:
          type: string
        city:
          type: string
        address1:
          type: string
        address2:
          type: string
        phoneCountry:
          type: string
        phoneNumber:
          type: string

    BillingData:
      type: object
      properties:
        company:
          type: object
          properties:
            company_name:
              type: string
            plan_name:
              type: string
        subscription:
          type: object
          properties:
            id:
              type: string
            planName:
              type: string
            cycle:
              type: string
            unitAmount:
              type: integer
            status:
              type: string
              enum: [active, past_due, canceled, trialing]
            renewalDate:
              type: string
              format: date
        paymentMethods:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              brand:
                type: string
              last4:
                type: string
              expMonth:
                type: integer
              expYear:
                type: integer
              isDefault:
                type: boolean
        billingAddress:
          $ref: '#/components/schemas/BillingAddress'
        invoices:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              date:
                type: string
                format: date
              amount:
                type: integer
              status:
                type: string
              pdfUrl:
                type: string
                format: uri

    CompanyNotification:
      type: object
      properties:
        notification_id:
          type: string
        company_id:
          type: string
        notification_type:
          type: string
          enum: ['1', '2', '3']
        title:
          type: string
        message:
          type: string
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time

    ExecutionHistoryItem:
      type: object
      properties:
        id:
          type: string
        executedAt:
          type: string
          format: date-time
        category:
          type: string
          enum: [投稿, アカウント払出, 情報変更, 削除, 削除予定]
        title:
          type: string
        description:
          type: string
        actor:
          type: string

    Paging:
      type: object
      properties:
        limit:
          type: integer
        hasNext:
          type: boolean
        nextCursor:
          type: string

    PaginatedList:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
        pagination:
          $ref: '#/components/schemas/Paging'

    EventStatus:
      type: string
      enum: [DRAFT, PUBLISHED, HIDDEN, DELETED]
      description: イベント公開状態

    Roles:
      type: string
      enum: [ORGANIZATION_OWNER, ORGANIZATION_ADMIN, ROOT, IMADMIN]

    DateOnly:
      type: string
      format: date
      description: Date in YYYY-MM-DD (UTC)

    DateTimeUTC:
      type: string
      format: date-time
      description: UTC ISO8601 datetime, e.g. 2026-02-16T10:30:00Z

    RateLimitInfo:
      type: object
      properties:
        limit:
          type: integer
        remaining:
          type: integer
        reset:
          type: integer

  examples:
    SuccessExample:
      summary: 共通成功レスポンス例
      value:
        success: true
        data: { }
        error: null
        timestamp: '2026-02-16T10:30:00Z'
    ErrorExample:
      summary: 共通エラーレスポンス例
      value:
        success: false
        data: null
        error:
          code: E1001
          message: '認証に失敗しました'
          details: []
        timestamp: '2026-02-16T10:30:00Z'

  # 共通のエラーコード一覧（説明用）
  x-error-codes:
    - code: E1001
      title: 認証失敗
    - code: E1002
      title: トークン期限切れ
    - code: E1003
      title: 権限不足
    - code: E2001
      title: 必須パラメータ不足
    - code: E3001
