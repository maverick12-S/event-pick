openapi: 3.0.3
info:
  title: EventPick API
  version: 1.0.0
  description: |
    EventPick API — フロントエンド要件に合わせた簡易 OpenAPI 仕様。
    全APIは共通レスポンスラッパーを返却し、JWT Bearer 認証を使用します。
servers:
  - url: https://api.eventpick.jp

security:
  - bearerAuth: []

paths:
  # ── Auth ──────────────────────────────────────
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: ログイン
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 認証成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'
        '401':
          description: 認証失敗

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: ログアウト
      responses:
        '200':
          description: ログアウト成功

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: アクセストークン更新
      responses:
        '200':
          description: トークン更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'

  /api/v1/auth/revoke:
    post:
      tags: [Auth]
      summary: トークン無効化
      responses:
        '200':
          description: 無効化成功

  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: 新規登録
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: 登録成功

  /api/v1/auth/mfa/verify:
    post:
      tags: [Auth]
      summary: MFA 検証
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        '200':
          description: MFA 検証成功

  /api/v1/auth/password-reset:
    post:
      tags: [Auth]
      summary: パスワードリセット要求
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: リセットメール送信済み

  /api/v1/auth/password-change:
    post:
      tags: [Auth]
      summary: パスワード変更
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: パスワード変更成功

  # ── Companies / My ────────────────────────────
  /api/v1/companies/me:
    get:
      tags: [Company]
      summary: 自社情報取得
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/Company'
    put:
      tags: [Company]
      summary: 自社情報更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Company'
      responses:
        '200':
          description: 更新成功

  /api/v1/companies/me/notifications:
    get:
      tags: [Company]
      summary: 自社通知一覧
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/CompanyNotification'

  # ── Company Accounts ──────────────────────────
  /api/v1/company-accounts:
    get:
      tags: [CompanyAccount]
      summary: 拠点アカウント一覧
      parameters:
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationPage'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/CompanyAccount'

  /api/v1/company-accounts/{accountId}:
    get:
      tags: [CompanyAccount]
      summary: 拠点アカウント詳細
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/CompanyAccount'
    put:
      tags: [CompanyAccount]
      summary: 拠点アカウント更新
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyAccount'
      responses:
        '200':
          description: 更新成功

  # ── Companies (CRUD) ──────────────────────────
  /api/v1/companies:
    get:
      tags: [Company]
      summary: 企業一覧
      parameters:
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationPage'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Company'
    post:
      tags: [Company]
      summary: 企業作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Company'
      responses:
        '201':
          description: 作成成功

  /api/v1/companies/{companyId}:
    get:
      tags: [Company]
      summary: 企業詳細
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
    put:
      tags: [Company]
      summary: 企業更新
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Company'
      responses:
        '200':
          description: 更新成功
    delete:
      tags: [Company]
      summary: 企業削除
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 削除成功

  /api/v1/companies/{companyId}/status:
    patch:
      tags: [Company]
      summary: 企業ステータス変更
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
      responses:
        '200':
          description: ステータス更新成功

  /api/v1/companies/{companyId}/review:
    post:
      tags: [Company]
      summary: 企業レビュー申請
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyReview'
      responses:
        '201':
          description: レビュー申請成功

  /api/v1/companies/drafts:
    get:
      tags: [Company]
      summary: 下書き企業一覧
      responses:
        '200':
          description: 成功

  /api/v1/corporations/validate:
    post:
      tags: [Corporation]
      summary: 法人番号バリデーション
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [corporateCode]
              properties:
                corporateCode:
                  type: string
      responses:
        '200':
          description: バリデーション結果

  # ── Events ────────────────────────────────────
  /api/v1/events:
    get:
      tags: [Event]
      summary: イベント一覧
      parameters:
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationPage'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/EventPost'
    post:
      tags: [Event]
      summary: イベント作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCreateRequest'
      responses:
        '201':
          description: 作成成功

  /api/v1/events/today:
    get:
      tags: [Event]
      summary: 今日のイベント一覧
      responses:
        '200':
          description: 成功

  /api/v1/events/tomorrow:
    get:
      tags: [Event]
      summary: 明日のイベント一覧
      responses:
        '200':
          description: 成功

  /api/v1/events/search:
    get:
      tags: [Event]
      summary: イベント検索
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationPage'
      responses:
        '200':
          description: 成功

  /api/v1/events/scheduled:
    get:
      tags: [Event]
      summary: 予約投稿一覧
      responses:
        '200':
          description: 成功

  /api/v1/events/drafts:
    get:
      tags: [Event]
      summary: 下書きイベント一覧
      responses:
        '200':
          description: 成功

  /api/v1/events/preview:
    post:
      tags: [Event]
      summary: イベントプレビュー
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCreateRequest'
      responses:
        '200':
          description: プレビュー成功

  /api/v1/events/{eventId}:
    get:
      tags: [Event]
      summary: イベント詳細
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
    put:
      tags: [Event]
      summary: イベント更新
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCreateRequest'
      responses:
        '200':
          description: 更新成功

  /api/v1/events/{eventId}/publish:
    post:
      tags: [Event]
      summary: イベント公開
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 公開成功

  /api/v1/events/{eventId}/hide:
    post:
      tags: [Event]
      summary: イベント非公開
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 非公開成功

  /api/v1/events/{eventId}/schedule:
    delete:
      tags: [Event]
      summary: 予約投稿削除
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 削除成功

  /api/v1/events/{eventId}/media:
    post:
      tags: [Event]
      summary: メディアアップロード
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: アップロード成功

  /api/v1/events/{eventId}/media/{mediaId}:
    delete:
      tags: [Event]
      summary: メディア削除
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
        - name: mediaId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 削除成功

  # ── Users ─────────────────────────────────────
  /api/v1/users:
    get:
      tags: [User]
      summary: ユーザー一覧
      parameters:
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationPage'
      responses:
        '200':
          description: 成功

  /api/v1/users/{userId}:
    get:
      tags: [User]
      summary: ユーザー詳細
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功

  /api/v1/users/{userId}/suspend:
    post:
      tags: [User]
      summary: ユーザー停止
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 停止成功

  # ── Maps ──────────────────────────────────────
  /api/v1/maps/google:
    get:
      tags: [Maps]
      summary: Google Maps 検索
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功

  # ── Uploads ───────────────────────────────────
  /api/v1/uploads/presigned-url:
    post:
      tags: [Upload]
      summary: S3 署名付きURL取得
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileName, contentType]
              properties:
                fileName:
                  type: string
                contentType:
                  type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          uploadUrl:
                            type: string
                            format: uri
                          publicUrl:
                            type: string
                            format: uri

  # ── Reports ───────────────────────────────────
  /api/v1/reports/summary:
    get:
      tags: [Report]
      summary: レポートサマリー
      responses:
        '200':
          description: 成功

  /api/v1/reports/search:
    get:
      tags: [Report]
      summary: レポート検索
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationPage'
      responses:
        '200':
          description: 成功

  /api/v1/reports/{accountId}:
    get:
      tags: [Report]
      summary: アカウント別レポート
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功

  /api/v1/reports/{accountId}/{eventId}:
    get:
      tags: [Report]
      summary: イベント別レポート詳細
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功

  # ── Billing ───────────────────────────────────
  /api/v1/billing:
    get:
      tags: [Billing]
      summary: 請求情報取得
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/BillingData'

  /api/v1/billing/checkout-session:
    post:
      tags: [Billing]
      summary: Stripe チェックアウトセッション作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [priceId]
              properties:
                priceId:
                  type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          sessionUrl:
                            type: string
                            format: uri

  /api/v1/billing/plan/change:
    post:
      tags: [Billing]
      summary: プラン変更
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [planId]
              properties:
                planId:
                  type: string
      responses:
        '200':
          description: プラン変更成功

  /api/v1/billing/cancel:
    post:
      tags: [Billing]
      summary: サブスクリプション解約
      responses:
        '200':
          description: 解約成功

  /api/v1/billing/address:
    get:
      tags: [Billing]
      summary: 請求先住所取得
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/BillingAddress'
    put:
      tags: [Billing]
      summary: 請求先住所更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingAddress'
      responses:
        '200':
          description: 更新成功

  /api/v1/billing/coupon/apply:
    post:
      tags: [Billing]
      summary: クーポン適用
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [couponCode]
              properties:
                couponCode:
                  type: string
      responses:
        '200':
          description: 適用成功

  # ── Audit / History / Tickets / Notifications ─
  /api/v1/audit-logs:
    get:
      tags: [Audit]
      summary: 監査ログ一覧
      parameters:
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationPage'
      responses:
        '200':
          description: 成功

  /api/v1/execution-history:
    get:
      tags: [ExecutionHistory]
      summary: 実行履歴一覧
      parameters:
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationPage'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ExecutionHistoryItem'

  /api/v1/inquiries:
    get:
      tags: [Inquiry]
      summary: お問い合わせ一覧
      responses:
        '200':
          description: 成功
    post:
      tags: [Inquiry]
      summary: お問い合わせ送信
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, subject, body]
              properties:
                type:
                  type: string
                subject:
                  type: string
                body:
                  type: string
      responses:
        '201':
          description: 送信成功

  /api/v1/notifications:
    get:
      tags: [Notification]
      summary: 通知一覧
      responses:
        '200':
          description: 成功

  /api/v1/notifications/{notificationId}/read:
    post:
      tags: [Notification]
      summary: 通知既読
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 既読成功

  /api/v1/notifications/read-all:
    post:
      tags: [Notification]
      summary: 全通知既読
      responses:
        '200':
          description: 成功

  /api/v1/tickets:
    get:
      tags: [Ticket]
      summary: チケット残量取得
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CommonResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/CompanyTicket'

  # ── Webhooks ──────────────────────────────────
  /api/v1/webhooks/stripe:
    post:
      tags: [Webhook]
      summary: Stripe Webhook
      security: []
      responses:
        '200':
          description: 処理成功

  # ── Agreement Logs ────────────────────────────
  /api/v1/agreement-logs:
    post:
      tags: [Agreement]
      summary: 同意ログ記録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agreementType]
              properties:
                agreementType:
                  type: string
                  enum: [PRIVACY_POLICY, TERMS_OF_SERVICE, LICENSE_AGREEMENT]
      responses:
        '201':
          description: 記録成功

  # ── Master Data ───────────────────────────────
  /api/v1/master/prefectures:
    get:
      tags: [Master]
      summary: 都道府県一覧
      security: []
      responses:
        '200':
          description: 成功

  /api/v1/master/cities:
    get:
      tags: [Master]
      summary: 市区町村一覧
      security: []
      parameters:
        - name: prefectureCode
          in: query
          schema:
